<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="#FEF3C7" opacity="0.5"/>

  <!-- Desk -->
  <rect x="80" y="200" width="240" height="12" rx="6" fill="#D97706"/>
  <rect x="100" y="212" width="10" height="50" rx="5" fill="#D97706"/>
  <rect x="290" y="212" width="10" height="50" rx="5" fill="#D97706"/>

  <!-- Laptop -->
  <rect x="140" y="160" width="120" height="40" rx="4" fill="#1E40AF"/>
  <rect x="145" y="164" width="110" height="32" rx="3" fill="#BFDBFE"/>
  <rect x="130" y="198" width="140" height="6" rx="3" fill="#1D4ED8"/>

  <!-- Code lines on screen -->
  <rect x="152" y="170" width="40" height="4" rx="2" fill="#60A5FA"/>
  <rect x="152" y="178" width="60" height="4" rx="2" fill="#93C5FD"/>
  <rect x="152" y="186" width="30" height="4" rx="2" fill="#60A5FA"/>

  <!-- Left person -->
  <circle cx="120" cy="130" r="22" fill="#FDE68A"/>
  <circle cx="120" cy="128" r="14" fill="#FBBF24"/>
  <!-- Body -->
  <rect x="104" y="152" width="32" height="48" rx="10" fill="#2563EB"/>
  <!-- Arm pointing -->
  <line x1="136" y1="165" x2="158" y2="175" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>

  <!-- Right person -->
  <circle cx="280" cy="130" r="22" fill="#FDE68A"/>
  <circle cx="280" cy="128" r="14" fill="#FBBF24"/>
  <!-- Body -->
  <rect x="264" y="152" width="32" height="48" rx="10" fill="#7C3AED"/>
  <!-- Arm -->
  <line x1="264" y1="165" x2="242" y2="175" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>

  <!-- Lightbulb above laptop -->
  <circle cx="200" cy="100" r="18" fill="#FCD34D" opacity="0.9"/>
  <rect x="195" y="116" width="10" height="8" rx="2" fill="#F59E0B"/>
  <line x1="200" y1="78" x2="200" y2="72" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="218" y1="84" x2="222" y2="80" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="182" y1="84" x2="178" y2="80" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="224" y1="100" x2="230" y2="100" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="100" x2="170" y2="100" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
</svg>
